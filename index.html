<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Infinita — Every rocket launch in history, visualized. Explore 7,000+ launches in an interactive 3D solar system with real NASA data." />
    <meta name="theme-color" content="#0d1117" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="/Infinita/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/Infinita/favicon.svg" />
    <title>Infinita — Space Launch Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
      /* Critical CSS — shown before JS loads (prevents FOUC / CLS) */
      body { margin: 0; background: #0d1117; overflow: hidden; color: #f5f5f5; font-family: system-ui, sans-serif; }
      #root { min-height: 100vh; min-height: 100dvh; }
      /* Reserve space for canvas and splash to prevent CLS */
      #canvas-container { position: fixed; inset: 0; }
      #canvas-container canvas { display: block; width: 100%; height: 100%; }
      #splash { position: fixed; inset: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;font-family:system-ui,sans-serif;color:#f5f5f5;background:#0d1117">
        <div>
          <h1 style="font-size:2rem;margin-bottom:1rem;letter-spacing:0.1em">INFINITA</h1>
          <p style="color:#b0b0b0;margin-bottom:1rem">The complete history of spaceflight — 7,223 missions tracked</p>
          <p style="color:#9e9e9e;font-size:0.875rem">This site requires JavaScript for the interactive 3D experience and launch database. Please enable JavaScript to explore.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
